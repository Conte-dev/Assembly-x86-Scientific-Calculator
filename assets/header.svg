<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f0f"/>
      <stop offset="100%" stop-color="#1c1c1c"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff7a00"/>
      <stop offset="100%" stop-color="#ffb347"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- BACKGROUND -->
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- GRID -->
  <g opacity="0.05">
    <path d="M0 60 H1200 M0 120 H1200 M0 180 H1200 M0 240 H1200"
          stroke="#ffffff"/>

    <path d="M120 0 V300 M240 0 V300 M360 0 V300 M480 0 V300
             M600 0 V300 M720 0 V300 M840 0 V300 M960 0 V300 M1080 0 V300"
          stroke="#ffffff"/>
  </g>

  <!-- ACCENT BAR -->
  <rect x="80" y="70" width="6" height="160"
        fill="url(#accent)"
        filter="url(#glow)"/>

  <!-- TITLE -->
  <text x="120" y="145"
        fill="#ffffff"
        font-size="54"
        font-family="monospace"
        font-weight="700">
    Assembly x86 Calculator
  </text>

  <!-- SUBTITLE -->
  <text x="120" y="190"
        fill="#b5b5b5"
        font-size="20"
        font-family="monospace">
    Low-level arithmetic calculator
  </text>

  <!-- FAKE AVATAR (100% GITHUB SAFE) -->
  <circle cx="1030" cy="155" r="80"
          fill="#2a2a2a"
          stroke="#ffffff"
          stroke-width="4"
          filter="url(#glow)"/>

  <!-- initials -->
  <text x="1030" y="165"
        text-anchor="middle"
        fill="#ffffff"
        font-size="30"
        font-family="monospace"
        font-weight="700">
    C
  </text>

</svg>
